<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>News Settings</title>
  <style>
    :root {
      --primary: #6366f1;
      --bg: #0f172a;
      --card: #1e293b;
      --text: #f8fafc;
      --text-dim: #94a3b8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      background-color: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      padding: 16px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    h1 { font-size: 1rem; font-weight: 800; }

    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--card);
      padding: 12px;
      border-radius: 12px;
      margin-bottom: 16px;
    }

    .switch {
      position: relative;
      display: inline-block;
      width: 40px;
      height: 22px;
    }

    .switch input { opacity: 0; width: 0; height: 0; }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: #334155;
      transition: .3s;
      border-radius: 22px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 16px; width: 16px;
      left: 3px; bottom: 3px;
      background-color: white;
      transition: .3s;
      border-radius: 50%;
    }

    input:checked + .slider { background-color: var(--primary); }
    input:checked + .slider:before { transform: translateX(18px); }

    .label {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 8px;
      display: block;
    }

    select {
      width: 100%;
      padding: 10px;
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: white;
      margin-bottom: 16px;
      outline: none;
    }

    .grid {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 20px;
    }

    .pill {
      padding: 6px 10px;
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      font-size: 0.7rem;
      color: var(--text-dim);
      cursor: pointer;
      transition: all 0.2s;
    }

    .pill.active {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    .save-btn {
      width: 100%;
      background: var(--primary);
      color: white;
      border: none;
      padding: 12px;
      border-radius: 10px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.1s;
    }

    .save-btn:active { transform: scale(0.98); }

    #msg {
      text-align: center;
      font-size: 0.75rem;
      color: #10b981;
      margin-top: 10px;
      display: none;
    }

    /* Credit Footer */
    .footer-credit {
      margin-top: 24px;
      padding-top: 12px;
      border-top: 1px solid rgba(255,255,255,0.05);
      text-align: center;
    }

    .footer-credit p {
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 0.5px;
    }

    .footer-credit a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 700;
      transition: color 0.2s;
    }

    .footer-credit a:hover {
      color: #818cf8;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Fantastic News</h1>
    <div id="status-dot" style="width: 8px; height: 8px; border-radius: 50%; background: #ef4444;"></div>
  </div>

  <div class="status-row">
    <span style="font-size: 0.85rem; font-weight: 600;">Active Status</span>
    <label class="switch">
      <input type="checkbox" id="isEnabled">
      <span class="slider"></span>
    </label>
  </div>

  <span class="label">News Interval</span>
  <select id="interval">
    <option value="0.5">30 Seconds (Test)</option>
    <option value="1">1 Minute</option>
    <option value="10">10 Minutes</option>
    <option value="30">30 Minutes</option>
    <option value="60">1 Hour</option>
    <option value="180">3 Hours</option>
    <option value="once-a-day">Once a Day (At Startup)</option>
  </select>

  <span class="label">Interests</span>
  <div id="category-grid" class="grid"></div>

  <button id="save-btn" class="save-btn">Save Changes</button>
  <div id="msg">Settings Updated!</div>

  <!-- New Credit Footer -->
  <footer class="footer-credit">
    <p>
      Designed and Developed by <br>
      <a href="https://github.com/avirajsalunkhe" id="github-link" target="_blank">Aviraj Salunkhe</a>
    </p>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
