<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Breaking News</title>
  <style>
    :root {
      --glass-bg: rgba(15, 23, 42, 0.85);
      --glass-border: rgba(255, 255, 255, 0.1);
      --accent: #6366f1;
      --text-primary: #f8fafc;
      --text-secondary: #cbd5e1;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: radial-gradient(at top left, #1e1b4b, #0f172a);
    }

    .glass-container {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      background: var(--glass-bg);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border: 1px solid var(--glass-border);
      position: relative;
    }

    /* Countdown Progress Bar */
    .timer-bar-container {
      position: absolute;
      bottom: 0; left: 0;
      width: 100%; height: 4px;
      background: rgba(255, 255, 255, 0.05);
      z-index: 100;
    }

    #timer-progress {
      height: 100%;
      width: 100%;
      background: var(--accent);
      box-shadow: 0 0 10px var(--accent);
      transition: width 1s linear;
    }

    .hero-area {
      position: relative; height: 200px; width: 100%;
      overflow: hidden; background: #000;
    }

    #news-image { width: 100%; height: 100%; object-fit: cover; }

    .image-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(15, 23, 42, 1) 0%, transparent 60%);
    }

    .badge {
      position: absolute; top: 16px; left: 16px;
      background: var(--accent); color: white;
      padding: 5px 10px; border-radius: 8px;
      font-size: 10px; font-weight: 800;
      text-transform: uppercase; letter-spacing: 1px;
      z-index: 10;
    }

    .content { flex: 1; padding: 24px; display: flex; flex-direction: column; }

    .meta-row {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px;
    }

    .meta {
      display: flex; align-items: center; gap: 6px;
      color: var(--accent); font-size: 11px; font-weight: 700;
      text-transform: uppercase;
    }

    .timer-text {
      color: var(--text-secondary); font-size: 10px;
      font-weight: 600; font-family: monospace;
      background: rgba(255, 255, 255, 0.05);
      padding: 2px 6px; border-radius: 4px;
    }

    h1 {
      font-size: 1.2rem; font-weight: 800; color: var(--text-primary);
      line-height: 1.3; margin-bottom: 12px;
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
    }

    p {
      font-size: 0.85rem; color: var(--text-secondary); line-height: 1.6;
      margin-bottom: 20px; display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden;
    }

    .actions { display: flex; align-items: center; gap: 12px; margin-top: auto; padding-bottom: 8px; }

    .read-btn {
      flex: 1; background: var(--accent); color: white;
      text-decoration: none; text-align: center; padding: 12px;
      border-radius: 12px; font-size: 14px; font-weight: 700;
      transition: all 0.2s ease;
    }

    .icon-btn {
      width: 44px; height: 44px; display: flex; align-items: center; justify-content: center;
      background: rgba(255, 255, 255, 0.05); border: 1px solid var(--glass-border);
      border-radius: 12px; color: var(--text-primary); cursor: pointer;
    }

    .icon-btn.close:hover { background: rgba(239, 68, 68, 0.2); color: #f87171; }

    #loader {
      position: fixed; inset: 0; background: #0f172a;
      display: flex; align-items: center; justify-content: center; z-index: 100;
    }

    .spinner { width: 30px; height: 30px; border: 3px solid rgba(99, 102, 241, 0.2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div id="loader">
    <div class="spinner"></div>
  </div>

  <div id="main-content" class="glass-container hidden">
    <div class="hero-area" id="hero-wrapper">
      <img id="news-image" src="" alt="">
      <div class="image-overlay"></div>
      <span id="news-source" class="badge">Source</span>
    </div>

    <div class="content">
      <div class="meta-row">
        <div class="meta">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          Breaking Update
        </div>
        <div id="timer-text" class="timer-text">--s left</div>
      </div>

      <h1 id="news-title">Headline Loading...</h1>
      <p id="news-desc">Fetching details...</p>

      <div class="actions">
        <a id="news-link" href="#" target="_blank" class="read-btn">Read Full Story</a>
        <button id="skip-btn" class="icon-btn" title="Skip Next News">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/><line x1="2" y1="2" x2="22" y2="22"/></svg>
        </button>
        <button id="close-btn" class="icon-btn close" title="Close">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
    </div>

    <!-- The Countdown Bar -->
    <div class="timer-bar-container">
      <div id="timer-progress"></div>
    </div>
  </div>

  <script src="news_popup.js"></script>
</body>
</html>
